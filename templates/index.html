<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forge Signature Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Forge Signature Detection</h1>
        
        <div class="video-container">
            <video id="video" width="640" height="480" autoplay></video>
        </div>

        <button id="capture">Capture & Detect</button>

        <p id="result">Prediction will appear here</p>
    </div>

    <script>
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({
    video: {
        facingMode: { exact: "environment" }  // BACK CAMERA
    }
})
.then(stream => {
    video.srcObject = stream;
})
.catch(error => {
    console.log("Back camera not available, switching to default.");
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        video.srcObject = stream;
    });
});
</script>
</body>
</html>
