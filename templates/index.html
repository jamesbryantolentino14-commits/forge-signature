<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signature Verification System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f2937, #111827);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1f2937;
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        p {
            font-size: 14px;
            margin-bottom: 25px;
            color: #9ca3af;
        }

        input[type="file"] {
            margin-bottom: 20px;
            color: white;
        }

        button {
            background: #3b82f6;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #2563eb;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
        }

        .genuine {
            background: #065f46;
        }

        .forged {
            background: #7f1d1d;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AI Signature Verification</h1>
    <p>Upload a signature image to verify authenticity</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br>
        <button type="submit">Analyze Signature</button>
    </form>

    {% if prediction %}
        <div class="result {{ 'genuine' if prediction == 'Genuine Signature' else 'forged' }}">
            {{ prediction }} <br>
            Confidence: {{ confidence }}%
        </div>
    {% endif %}

    <footer>
        Developed by Bryan | AI Deep Learning System
    </footer>
</div>

</body>
</html>
