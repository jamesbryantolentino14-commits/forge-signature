<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forge Signature Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Forge Signature Detection</h1>

        <div class="video-container">
            <video id="video" width="640" height="480" autoplay playsinline></video>
        </div>

        <button id="capture">Capture & Detect</button>

        <div id="result" class="result"></div>
    </div>

<script>
const video = document.getElementById('video');
const captureButton = document.getElementById('capture');
const resultDiv = document.getElementById('result');

// Start camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => { video.srcObject = stream; })
.catch(() => { navigator.mediaDevices.getUserMedia({ video: true }).then(stream => video.srcObject = stream); });

captureButton.addEventListener("click", async () => {
    try {
        captureButton.disabled = true;
        resultDiv.innerText = "Processing...";
        resultDiv.className = "result";

        const canvas = document.createElement("canvas");
        canvas.width = 100;   // resize to 100x100 to match model
        canvas.height = 100;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, 100, 100);

        const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg"));

        const formData = new FormData();
        formData.append("image", blob, "capture.jpg");

        const response = await fetch("/predict", { method: "POST", body: formData });
        const data = await response.json();

        resultDiv.innerText = data.result;
        resultDiv.className = "result " + data.status;

    } catch (error) {
        console.error(error);
        resultDiv.innerText = "Error detecting signature";
        resultDiv.className = "result unreliable";
    }
    captureButton.disabled = false;
});
</script>

</body>
</html>
